name: Set up project
description: Restore shared tool caches and install Python dependencies when needed.

inputs:
  install-deps:
    description: Run mise run deps after tools are ready.
    default: 'false'
  prek-cache:
    description: Restore the prek hook cache.
    default: 'false'
  uv-cache:
    description: Restore the uv cache.
    default: 'false'

runs:
  using: composite
  steps:
    - name: Restore mise tool cache
      uses: actions/cache@v5
      with:
        path: |
          ~/.local/share/mise
          ~/AppData/Local/mise
        key: mise-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.mise/mise.lock') }}
        restore-keys: mise-${{ runner.os }}-${{ runner.arch }}-

    - name: Restore prek cache
      if: inputs['prek-cache'] == 'true'
      uses: actions/cache@v5
      with:
        path: ~/.cache/prek
        key: prek-${{ runner.os }}-${{ hashFiles('prek.toml') }}
        restore-keys: |
          prek-${{ runner.os }}-

    - name: Restore uv cache
      if: inputs['uv-cache'] == 'true'
      uses: actions/cache@v5
      with:
        path: ${{ env.UV_CACHE_DIR }}
        key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
        restore-keys: |
          uv-${{ runner.os }}-

    - name: Set up mise
      uses: jdx/mise-action@v4
      with:
        cache: false

    - name: Install dependencies
      if: inputs['install-deps'] == 'true'
      shell: bash
      run: mise run deps
