name: Release candidate

on:
  push:
    branches: ['release/**']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  candidate:
    name: Check and package
    uses: ./.github/workflows/_verify.yml
    permissions:
      actions: write
      contents: read
    with:
      artifact_name: pasty-release-package
      checkout_ref: ${{ github.sha }}
      profile: full
