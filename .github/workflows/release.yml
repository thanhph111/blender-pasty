name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release or upload, such as v0.2.0
        required: true
        type: string
      upload_blender_extensions:
        description: Upload this version to Blender Extensions using the API
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  UV_CACHE_DIR: ${{ github.workspace }}/.cache/uv

jobs:
  resolve-package:
    name: Find checked package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    outputs:
      check_run_id: ${{ steps.resolve.outputs.check_run_id }}
      commit: ${{ steps.resolve.outputs.commit }}
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@v7
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Find successful main checks
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="$RELEASE_TAG"
          version="${tag#v}"
          if [ "$tag" != "v$version" ] || [ -z "$version" ]; then
            echo "Release tag must look like v0.2.0, got: $tag" >&2
            exit 1
          fi

          commit="$(git rev-list -n 1 "$tag")"
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$commit" refs/remotes/origin/main; then
            echo "$tag points at $commit, which is not on origin/main." >&2
            exit 1
          fi

          manifest_version="$(python3 -c 'import tomllib; print(tomllib.load(open("blender_manifest.toml", "rb"))["version"])')"
          if [ "$manifest_version" != "$version" ]; then
            echo "blender_manifest.toml version is $manifest_version, expected $version." >&2
            exit 1
          fi

          check_run_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/checks.yml/runs" \
              --method GET \
              -f branch=main \
              -f event=push \
              -f head_sha="$commit" \
              -f status=success \
              -f per_page=10 \
              --jq '(.workflow_runs[0] // empty) | .id'
          )"
          if [ -z "$check_run_id" ]; then
            echo "No successful Checks run on main found for $tag ($commit)." >&2
            echo "Wait for Checks to pass on main, then rerun this Release workflow." >&2
            exit 1
          fi

          {
            echo "check_run_id=${check_run_id}"
            echo "commit=${commit}"
            echo "tag=${tag}"
            echo "version=${version}"
          } >> "$GITHUB_OUTPUT"

  github-release:
    name: Draft GitHub release
    needs: [resolve-package]
    if: ${{ github.event_name == 'push' || inputs.upload_blender_extensions == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: write
    steps:
      - name: Check out release tag
        uses: actions/checkout@v7
        with:
          ref: refs/tags/${{ needs.resolve-package.outputs.tag }}
          persist-credentials: false

      - name: Set up project
        uses: ./.github/actions/setup-project

      - name: Download checked package
        env:
          CHECK_RUN_ID: ${{ needs.resolve-package.outputs.check_run_id }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p dist
          gh run download "$CHECK_RUN_ID" --name pasty-release-package --dir dist
          test -n "$(find dist -maxdepth 1 -type f -name 'pasty-*.zip' | head -n 1)"

      - name: Write release notes from changelog
        env:
          VERSION: ${{ needs.resolve-package.outputs.version }}
        run: mise run --quiet release notes -- "$VERSION" > dist/RELEASE_NOTES.md

      - name: Draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve-package.outputs.tag }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes-file dist/RELEASE_NOTES.md
            gh release upload "$RELEASE_TAG" dist/pasty-*.zip --clobber
          else
            gh release create "$RELEASE_TAG" \
              dist/pasty-*.zip \
              --draft \
              --verify-tag \
              --title "$RELEASE_TAG" \
              --notes-file dist/RELEASE_NOTES.md
          fi

  blender-extensions-upload:
    name: Upload to Blender Extensions
    needs: [resolve-package]
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_blender_extensions }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out release tag
        uses: actions/checkout@v7
        with:
          ref: refs/tags/${{ needs.resolve-package.outputs.tag }}
          persist-credentials: false

      - name: Set up project
        uses: ./.github/actions/setup-project

      - name: Download GitHub release package
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve-package.outputs.tag }}
        shell: bash
        run: |
          mkdir -p dist
          gh release download "$RELEASE_TAG" --pattern 'pasty-*.zip' --dir dist --clobber

      - name: Write release notes from changelog
        env:
          VERSION: ${{ needs.resolve-package.outputs.version }}
        run: mise run --quiet release notes -- "$VERSION" > dist/RELEASE_NOTES.md

      - name: Upload version to Blender Extensions
        env:
          BLENDER_EXTENSION_TOKEN: ${{ secrets.BLENDER_EXTENSION_TOKEN }}
          BLENDER_EXTENSIONS_ID: ${{ vars.BLENDER_EXTENSIONS_ID }}
        shell: bash
        run: |
          if [ -z "$BLENDER_EXTENSION_TOKEN" ]; then
            echo "Missing BLENDER_EXTENSION_TOKEN secret" >&2
            exit 1
          fi
          if [ -z "$BLENDER_EXTENSIONS_ID" ]; then
            echo "Missing BLENDER_EXTENSIONS_ID repository variable" >&2
            exit 1
          fi

          package="$(find dist -maxdepth 1 -type f -name 'pasty-*.zip' | sort | head -n 1)"
          if [ -z "$package" ]; then
            echo "Missing dist/pasty-*.zip" >&2
            exit 1
          fi

          curl --fail --show-error --location \
            -X POST "https://extensions.blender.org/api/v1/extensions/${BLENDER_EXTENSIONS_ID}/versions/upload/" \
            -H "Authorization: Bearer ${BLENDER_EXTENSION_TOKEN}" \
            -F "version_file=@${package}" \
            -F "release_notes=<dist/RELEASE_NOTES.md"
