name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release, such as v0.1.0
        required: true
        type: string
      build_run_id:
        description: Successful Release Build run ID to promote. Leave empty to find it by tag commit.
        required: false
        type: string
      upload_blender_extensions:
        description: Upload this version to Blender Extensions using the API
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  resolve-build:
    name: Resolve release build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    outputs:
      build_run_id: ${{ steps.resolve.outputs.build_run_id }}
      build_url: ${{ steps.resolve.outputs.build_url }}
      commit: ${{ steps.resolve.outputs.commit }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Check out tag
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Find successful build for this commit
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_BUILD_RUN_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.build_run_id || '' }}
        shell: bash
        run: |
          tag="$RELEASE_TAG"
          commit="$(git rev-list -n 1 "$tag")"

          if [ -n "$INPUT_BUILD_RUN_ID" ]; then
            build_run_id="$INPUT_BUILD_RUN_ID"
          else
            build_run_id="$(
              gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/release-build.yml/runs" \
                -f head_sha="$commit" \
                -f status=success \
                -f per_page=20 \
                --jq '.workflow_runs[] | select(.head_branch | startswith("release/")) | .id' \
                | head -n 1
            )"
          fi

          if [ -z "$build_run_id" ]; then
            echo "No successful Release Build run found for ${tag} (${commit})." >&2
            echo "Push a release branch for this commit first, then push the tag." >&2
            exit 1
          fi

          build_head_sha="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${build_run_id}" --jq '.head_sha')"
          build_status="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${build_run_id}" --jq '.status')"
          build_conclusion="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${build_run_id}" --jq '.conclusion')"
          build_url="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${build_run_id}" --jq '.html_url')"

          if [ "$build_head_sha" != "$commit" ]; then
            echo "Release Build ${build_run_id} belongs to ${build_head_sha}, not ${commit}." >&2
            exit 1
          fi
          if [ "$build_status" != "completed" ] || [ "$build_conclusion" != "success" ]; then
            echo "Release Build ${build_run_id} is ${build_status}/${build_conclusion}, not completed/success." >&2
            exit 1
          fi

          {
            echo "build_run_id=${build_run_id}"
            echo "build_url=${build_url}"
            echo "commit=${commit}"
            echo "tag=${tag}"
          } >> "$GITHUB_OUTPUT"

  github-release:
    name: GitHub release
    needs: [resolve-build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.resolve-build.outputs.tag }}
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: Download package from release build
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_RUN_ID: ${{ needs.resolve-build.outputs.build_run_id }}
        shell: bash
        run: |
          gh run download "$BUILD_RUN_ID" --name pasty-release-package --dir dist
          test -n "$(find dist -maxdepth 1 -type f -name 'pasty-*.zip' | head -n 1)"
          test -f dist/SHA256SUMS

      - name: Write release notes from changelog
        shell: bash
        run: |
          version="${RELEASE_TAG#v}"
          mise run --quiet release-notes -- "$version" > dist/RELEASE_NOTES.md

      - name: Create or update draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes-file dist/RELEASE_NOTES.md
            gh release upload "$RELEASE_TAG" dist/pasty-*.zip dist/SHA256SUMS --clobber
          else
            gh release create "$RELEASE_TAG" \
              dist/pasty-*.zip \
              dist/SHA256SUMS \
              --draft \
              --verify-tag \
              --title "$RELEASE_TAG" \
              --notes-file dist/RELEASE_NOTES.md
          fi

  blender-extensions-upload:
    name: Blender Extensions upload
    needs: [resolve-build]
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_blender_extensions }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.resolve-build.outputs.tag }}
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: Download package from release build
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_RUN_ID: ${{ needs.resolve-build.outputs.build_run_id }}
        shell: bash
        run: |
          gh run download "$BUILD_RUN_ID" --name pasty-release-package --dir dist
          test -n "$(find dist -maxdepth 1 -type f -name 'pasty-*.zip' | head -n 1)"

      - name: Write release notes from changelog
        shell: bash
        run: |
          version="${RELEASE_TAG#v}"
          mise run --quiet release-notes -- "$version" > dist/RELEASE_NOTES.md

      - name: Upload version to Blender Extensions
        env:
          BLENDER_EXTENSION_TOKEN: ${{ secrets.BLENDER_EXTENSION_TOKEN }}
          BLENDER_EXTENSIONS_ID: ${{ vars.BLENDER_EXTENSIONS_ID }}
        shell: bash
        run: |
          if [ -z "$BLENDER_EXTENSION_TOKEN" ]; then
            echo "Missing BLENDER_EXTENSION_TOKEN secret" >&2
            exit 1
          fi
          if [ -z "$BLENDER_EXTENSIONS_ID" ]; then
            echo "Missing BLENDER_EXTENSIONS_ID repository variable" >&2
            exit 1
          fi

          package="$(find dist -maxdepth 1 -type f -name 'pasty-*.zip' | sort | head -n 1)"
          if [ -z "$package" ]; then
            echo "Missing dist/pasty-*.zip" >&2
            exit 1
          fi

          curl --fail --show-error --location \
            -X POST "https://extensions.blender.org/api/v1/extensions/${BLENDER_EXTENSIONS_ID}/versions/upload/" \
            -H "Authorization: Bearer ${BLENDER_EXTENSION_TOKEN}" \
            -F "version_file=@${package}" \
            -F "release_notes=<dist/RELEASE_NOTES.md"
