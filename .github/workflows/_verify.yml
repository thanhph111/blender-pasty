name: Verify

on:
  workflow_call:
    inputs:
      artifact_name:
        description: Name for the uploaded extension package artifact
        required: false
        type: string
        default: pasty
      checkout_ref:
        description: Git ref to check out before running verification
        required: false
        type: string
        default: ''
      create_checksum:
        description: Create and upload SHA256SUMS beside the extension zip
        required: false
        type: boolean
        default: false
      profile:
        description: Verification depth. Use fast for PRs and full for scheduled/release runs.
        required: false
        type: string
        default: fast

env:
  # Keep Blender, dprint, and uv state inside the workspace so CI is repeatable.
  BLENDER_USER_CONFIG: ${{ github.workspace }}/.cache/blender-user/config
  BLENDER_USER_EXTENSIONS: ${{ github.workspace }}/.cache/blender-user/extensions
  BLENDER_USER_SCRIPTS: ${{ github.workspace }}/.cache/blender-user/scripts
  DPRINT_CACHE_DIR: ${{ github.workspace }}/.cache/dprint
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}
  UV_CACHE_DIR: ${{ github.workspace }}/.cache/uv

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref }}
          persist-credentials: false

      - name: Restore mise tool cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/mise
          key: mise-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.mise/mise.lock') }}
          restore-keys: mise-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore prek cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/prek
          key: prek-${{ runner.os }}-${{ hashFiles('prek.toml') }}
          restore-keys: |
            prek-${{ runner.os }}-

      - name: Restore dprint cache
        uses: actions/cache@v5
        with:
          path: ${{ env.DPRINT_CACHE_DIR }}
          key: dprint-${{ runner.os }}-${{ hashFiles('dprint.jsonc') }}
          restore-keys: |
            dprint-${{ runner.os }}-

      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: Install dependencies
        run: mise run deps

      - name: Run lint checks
        run: mise run lint

      - name: Minimize uv cache
        run: mise exec -- uv cache prune --ci

  test:
    name: Test
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref }}
          persist-credentials: false

      - name: Restore mise tool cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/mise
          key: mise-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.mise/mise.lock') }}
          restore-keys: mise-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: Install dependencies
        run: mise run deps

      - name: Run tests
        run: mise run test

      - name: Minimize uv cache
        run: mise exec -- uv cache prune --ci

  blender-matrix:
    name: Plan Blender matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Choose Blender matrix
        id: matrix
        shell: python
        run: |
          import json
          import os
          import sys

          profile = "${{ inputs.profile }}"
          if profile == "fast":
              runners = {
                  "ubuntu-24.04": ["4.2", "5.1"],
              }
          elif profile == "full":
              runners = {
                  "ubuntu-24.04": ["4.2", "4.5", "5.1"],
                  "windows-2025": ["4.2", "4.5", "5.1"],
                  "macos-15": ["4.2", "4.5", "5.1"],
                  "macos-15-intel": ["4.2", "4.5", "5.1"],
              }
          else:
              print(f"Unknown profile: {profile}", file=sys.stderr)
              raise SystemExit(1)

          matrix = {
              "include": [
                  {"os": os_name, "blender": blender}
                  for os_name, blenders in runners.items()
                  for blender in blenders
              ]
          }

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"matrix={json.dumps(matrix, separators=(',', ':'))}\n")

  blender:
    name: Blender / ${{ matrix.os }} / ${{ matrix.blender }}
    needs: [test, blender-matrix]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.blender-matrix.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref }}
          persist-credentials: false

      - name: Restore mise tool cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/mise
          key: mise-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.mise/mise.lock') }}
          restore-keys: mise-${{ runner.os }}-${{ runner.arch }}-

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: Restore Blender cache
        id: blender_cache
        uses: actions/cache/restore@v5
        with:
          path: .cache/blender
          key: blender-${{ runner.os }}-${{ runner.arch }}-${{ matrix.blender }}

      - name: Install Blender
        id: install_blender
        run: mise run blender install ${{ matrix.blender }}

      - name: Delete stale Blender cache
        # GitHub cache entries are immutable. Delete the old key when the installer
        # replaced a cached Blender patch, then save the refreshed folder below.
        if: ${{ github.event_name != 'pull_request' && steps.blender_cache.outputs.cache-hit == 'true' && steps.install_blender.outputs.cache_updated == 'true' }}
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          BLENDER_CACHE_KEY: blender-${{ runner.os }}-${{ runner.arch }}-${{ matrix.blender }}
        run: gh cache delete "$BLENDER_CACHE_KEY" || true

      - name: Save Blender cache
        # Pull requests cannot reliably update shared caches, so refresh only on trusted events.
        if: ${{ github.event_name != 'pull_request' && (steps.blender_cache.outputs.cache-hit != 'true' || steps.install_blender.outputs.cache_updated == 'true') }}
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: .cache/blender
          key: blender-${{ runner.os }}-${{ runner.arch }}-${{ matrix.blender }}

      - name: Print Blender version
        run: mise run blender run -- --version

      - name: Run headless smoke test
        run: mise run blender run -- --background --factory-startup --python-exit-code 1 --python checks/smoke_repo.py

  package:
    name: Package
    needs: [test, blender]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref }}
          persist-credentials: false

      - name: Restore mise tool cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/mise
          key: mise-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.mise/mise.lock') }}
          restore-keys: mise-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: Install dependencies
        run: mise run deps

      - name: Restore Blender cache
        uses: actions/cache/restore@v5
        with:
          path: .cache/blender
          key: blender-${{ runner.os }}-${{ runner.arch }}-5.1

      - name: Install Blender
        run: mise run blender install 5.1

      - name: Build and smoke-test packaged add-on
        run: mise run test package

      - name: Create checksum
        if: inputs.create_checksum
        shell: bash
        run: shasum -a 256 dist/pasty-*.zip > dist/SHA256SUMS

      - name: Upload add-on
        if: ${{ !inputs.create_checksum }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}
          path: dist/pasty-*.zip
          if-no-files-found: error

      - name: Upload add-on and checksum
        if: inputs.create_checksum
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}
          path: |
            dist/pasty-*.zip
            dist/SHA256SUMS
          if-no-files-found: error

      - name: Minimize uv cache
        run: mise exec -- uv cache prune --ci
