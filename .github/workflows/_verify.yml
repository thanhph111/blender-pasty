name: Project checks

on:
  workflow_call:
    inputs:
      artifact_name:
        description: Name for the uploaded extension package artifact
        required: false
        type: string
        default: pasty
      checkout_ref:
        description: Git ref to check out before running checks
        required: false
        type: string
        default: ''
      profile:
        description: Check depth. Use fast for normal checks and full for release-candidate runs.
        required: false
        type: string
        default: fast

env:
  # Keep Blender, dprint, and uv state inside the workspace so automated checks are repeatable.
  BLENDER_USER_CONFIG: ${{ github.workspace }}/.cache/blender-user/config
  BLENDER_USER_EXTENSIONS: ${{ github.workspace }}/.cache/blender-user/extensions
  BLENDER_USER_SCRIPTS: ${{ github.workspace }}/.cache/blender-user/scripts
  DPRINT_CACHE_DIR: ${{ github.workspace }}/.cache/dprint
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}
  UV_CACHE_DIR: ${{ github.workspace }}/.cache/uv

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref }}
          persist-credentials: false

      - name: Restore mise tool cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.local/share/mise
            ~/AppData/Local/mise
          key: mise-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.mise/mise.lock') }}
          restore-keys: mise-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore prek cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/prek
          key: prek-${{ runner.os }}-${{ hashFiles('prek.toml') }}
          restore-keys: |
            prek-${{ runner.os }}-

      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: Install dependencies
        run: mise run deps

      - name: Run lint
        run: mise run lint

      - name: Minimize uv cache
        run: mise exec -- uv cache prune --ci

  source-addon:
    name: Source add-on
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref }}
          persist-credentials: false

      - name: Restore mise tool cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.local/share/mise
            ~/AppData/Local/mise
          key: mise-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.mise/mise.lock') }}
          restore-keys: mise-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: Install dependencies
        run: mise run deps

      - name: Run source add-on checks
        run: mise run test source

      - name: Minimize uv cache
        run: mise exec -- uv cache prune --ci

  headless-blender-targets:
    name: Plan headless Blender targets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref }}
          persist-credentials: false

      - name: Choose headless Blender targets
        id: matrix
        run: >-
          python .github/workflows/scripts/plan_targets.py headless
          --profile '${{ inputs.profile }}'

  headless-blender:
    name: ${{ matrix.target }}
    needs: [source-addon, headless-blender-targets]
    runs-on: ${{ startsWith(matrix.target, 'Linux,') && 'ubuntu-24.04' || startsWith(matrix.target, 'Windows,') && 'windows-2025' || 'macos-15' }}
    timeout-minutes: 30
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.headless-blender-targets.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref }}
          persist-credentials: false

      - name: Restore mise tool cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.local/share/mise
            ~/AppData/Local/mise
          key: mise-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.mise/mise.lock') }}
          restore-keys: mise-${{ runner.os }}-${{ runner.arch }}-

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: Resolve Blender target
        id: target
        shell: bash
        run: |
          case "${{ matrix.target }}" in
            Linux,\ Blender\ * | Windows,\ Blender\ * | macOS,\ Blender\ *)
              target="${{ matrix.target }}"
              blender="${target##*Blender }"
              platform="${target%%,*}"
              cache_key="$(printf '%s-blender-%s' "$platform" "$blender" | tr '[:upper:]' '[:lower:]')"
              echo "blender=${blender}" >> "$GITHUB_OUTPUT"
              echo "cache_key=${cache_key}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unknown Blender target: ${{ matrix.target }}" >&2
              exit 1
              ;;
          esac

      - name: Restore Blender cache
        id: blender_cache
        uses: actions/cache/restore@v5
        with:
          path: .cache/blender
          key: blender-${{ steps.target.outputs.cache_key }}-${{ runner.arch }}

      - name: Install Blender
        id: install_blender
        run: mise run blender install ${{ steps.target.outputs.blender }}

      - name: Delete stale Blender cache
        # GitHub cache entries are immutable. Delete the old key when the installer
        # replaced a cached Blender patch, then save the refreshed folder below.
        if: ${{ github.event_name != 'pull_request' && steps.blender_cache.outputs.cache-hit == 'true' && steps.install_blender.outputs.cache_updated == 'true' }}
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          BLENDER_CACHE_KEY: blender-${{ steps.target.outputs.cache_key }}-${{ runner.arch }}
        run: gh cache delete "$BLENDER_CACHE_KEY" || true

      - name: Save Blender cache
        # Pull requests cannot reliably update shared caches, so refresh only on trusted events.
        if: ${{ github.event_name != 'pull_request' && (steps.blender_cache.outputs.cache-hit != 'true' || steps.install_blender.outputs.cache_updated == 'true') }}
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: .cache/blender
          key: blender-${{ steps.target.outputs.cache_key }}-${{ runner.arch }}

      - name: Print Blender version
        run: mise run blender run -- --version

      - name: Run headless Blender checks
        run: mise run blender run -- --background --factory-startup --python-exit-code 1 --python checks/addon/source.py

  live-clipboard-targets:
    name: Plan live clipboard targets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref }}
          persist-credentials: false

      - name: Choose live clipboard targets
        id: matrix
        run: >-
          python .github/workflows/scripts/plan_targets.py clipboard
          --profile '${{ inputs.profile }}'

  live-clipboard:
    name: ${{ matrix.label }}
    needs: [source-addon, live-clipboard-targets]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.live-clipboard-targets.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref }}
          persist-credentials: false

      - name: Restore mise tool cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.local/share/mise
            ~/AppData/Local/mise
          key: mise-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.mise/mise.lock') }}
          restore-keys: mise-${{ runner.os }}-${{ runner.arch }}-

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: Restore Blender cache
        id: blender_cache
        uses: actions/cache/restore@v5
        with:
          path: .cache/blender
          key: blender-${{ matrix.cache_key }}-${{ runner.arch }}

      - name: Install Blender
        id: install_blender
        run: mise run blender install ${{ matrix.blender }}

      - name: Delete stale Blender cache
        if: ${{ github.event_name != 'pull_request' && steps.blender_cache.outputs.cache-hit == 'true' && steps.install_blender.outputs.cache_updated == 'true' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          BLENDER_CACHE_KEY: blender-${{ matrix.cache_key }}-${{ runner.arch }}
        run: gh cache delete "$BLENDER_CACHE_KEY" || true

      - name: Save Blender cache
        if: ${{ github.event_name != 'pull_request' && (steps.blender_cache.outputs.cache-hit != 'true' || steps.install_blender.outputs.cache_updated == 'true') }}
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: .cache/blender
          key: blender-${{ matrix.cache_key }}-${{ runner.arch }}

      - name: Install Linux X11 desktop tools
        if: matrix.session == 'linux-x11'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb xauth xclip libegl1

      - name: Install Linux Wayland desktop tools
        if: matrix.session == 'linux-wayland'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dbus-x11 \
            kmod \
            libdecor-0-0 \
            libegl-mesa0 \
            libegl1 \
            libgl1-mesa-dri \
            libgles2 \
            libwayland-egl1 \
            mesa-utils \
            mesa-utils-extra \
            sway \
            wl-clipboard \
            wtype \
            ydotool \
            ydotoold

      - name: Run Linux X11 clipboard check
        if: matrix.session == 'linux-x11'
        env:
          PASTY_CLIPBOARD_SCENARIO: all
        run: bash checks/linux/x11.sh

      - name: Run Linux Wayland clipboard check
        if: matrix.session == 'linux-wayland'
        env:
          PASTY_CLIPBOARD_SCENARIO: all
        run: bash checks/linux/wayland.sh

  installed-addon:
    name: Installed add-on
    needs: [source-addon, headless-blender, live-clipboard]
    if: ${{ !cancelled() && !failure() && (needs.live-clipboard.result == 'success' || needs.live-clipboard.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref }}
          persist-credentials: false

      - name: Restore mise tool cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.local/share/mise
            ~/AppData/Local/mise
          key: mise-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.mise/mise.lock') }}
          restore-keys: mise-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: Install dependencies
        run: mise run deps

      - name: Restore Blender cache
        uses: actions/cache/restore@v5
        with:
          path: .cache/blender
          key: blender-linux-blender-5.1-${{ runner.arch }}

      - name: Install Blender
        run: mise run blender install 5.1

      - name: Build and check installed add-on
        run: mise run test package

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}
          path: dist/pasty-*.zip
          if-no-files-found: error

      - name: Minimize uv cache
        run: mise exec -- uv cache prune --ci
