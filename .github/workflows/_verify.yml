name: Project checks

on:
  workflow_call:
    inputs:
      artifact_name:
        description: Name for the uploaded extension package artifact
        required: false
        type: string
        default: pasty
      checkout_ref:
        description: Git ref to check out before running checks
        required: false
        type: string
        default: ''
      create_checksum:
        description: Create and upload SHA256SUMS beside the extension zip
        required: false
        type: boolean
        default: false
      profile:
        description: Check depth. Use fast for PRs and full for scheduled/release-candidate runs.
        required: false
        type: string
        default: fast
      scope:
        description: Which expensive checks to run. Use all for normal CI.
        required: false
        type: string
        default: all
      headless_target:
        description: Optional headless target filter, such as Linux, Blender 4.2
        required: false
        type: string
        default: ''
      clipboard_target:
        description: Optional live clipboard target filter, such as Linux Wayland clipboard
        required: false
        type: string
        default: ''

env:
  # Keep Blender, dprint, and uv state inside the workspace so automated checks are repeatable.
  BLENDER_USER_CONFIG: ${{ github.workspace }}/.cache/blender-user/config
  BLENDER_USER_EXTENSIONS: ${{ github.workspace }}/.cache/blender-user/extensions
  BLENDER_USER_SCRIPTS: ${{ github.workspace }}/.cache/blender-user/scripts
  DPRINT_CACHE_DIR: ${{ github.workspace }}/.cache/dprint
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}
  UV_CACHE_DIR: ${{ github.workspace }}/.cache/uv

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref }}
          persist-credentials: false

      - name: Restore mise tool cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.local/share/mise
            ~/AppData/Local/mise
          key: mise-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.mise/mise.lock') }}
          restore-keys: mise-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore prek cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/prek
          key: prek-${{ runner.os }}-${{ hashFiles('prek.toml') }}
          restore-keys: |
            prek-${{ runner.os }}-

      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: Install dependencies
        run: mise run deps

      - name: Run lint
        run: mise run lint

      - name: Minimize uv cache
        run: mise exec -- uv cache prune --ci

  source-addon:
    name: Source add-on
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref }}
          persist-credentials: false

      - name: Restore mise tool cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.local/share/mise
            ~/AppData/Local/mise
          key: mise-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.mise/mise.lock') }}
          restore-keys: mise-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: Install dependencies
        run: mise run deps

      - name: Run source add-on checks
        run: mise run test

      - name: Minimize uv cache
        run: mise exec -- uv cache prune --ci

  headless-blender-targets:
    name: Plan headless Blender targets
    if: inputs.scope == 'all' || inputs.scope == 'headless'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Choose headless Blender targets
        id: matrix
        shell: python
        run: |
          import json
          import os
          import sys

          profile = "${{ inputs.profile }}"
          if profile == "fast":
              targets = ["Linux, Blender 4.2", "Linux, Blender 5.1"]
          elif profile == "full":
              targets = [
                  f"{platform}, Blender {blender}"
                  for platform in ("Linux", "Windows", "macOS")
                  for blender in ("4.2", "4.5", "5.1")
              ]
          else:
              print(f"Unknown profile: {profile}", file=sys.stderr)
              raise SystemExit(1)

          target_filter = "${{ inputs.headless_target }}".strip().lower()
          if target_filter:
              targets = [target for target in targets if target_filter in target.lower()]
              if not targets:
                  print(f"No headless Blender target matched: {target_filter}", file=sys.stderr)
                  raise SystemExit(1)

          # GitHub's sidebar can collapse matrix rows down to one matrix value.
          # Keep that value fully descriptive so repeated 4.2/4.5/5.1 rows stay readable.
          matrix = {"include": [{"target": target} for target in targets]}

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"matrix={json.dumps(matrix, separators=(',', ':'))}\n")

  headless-blender:
    name: ${{ matrix.target }}
    needs: [source-addon, headless-blender-targets]
    if: inputs.scope == 'all' || inputs.scope == 'headless'
    runs-on: ${{ startsWith(matrix.target, 'Linux,') && 'ubuntu-24.04' || startsWith(matrix.target, 'Windows,') && 'windows-2025' || 'macos-15' }}
    timeout-minutes: 30
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.headless-blender-targets.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref }}
          persist-credentials: false

      - name: Restore mise tool cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.local/share/mise
            ~/AppData/Local/mise
          key: mise-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.mise/mise.lock') }}
          restore-keys: mise-${{ runner.os }}-${{ runner.arch }}-

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: Resolve Blender target
        id: target
        shell: bash
        run: |
          case "${{ matrix.target }}" in
            Linux,\ Blender\ * | Windows,\ Blender\ * | macOS,\ Blender\ *)
              target="${{ matrix.target }}"
              blender="${target##*Blender }"
              platform="${target%%,*}"
              cache_key="$(printf '%s-blender-%s' "$platform" "$blender" | tr '[:upper:]' '[:lower:]')"
              echo "blender=${blender}" >> "$GITHUB_OUTPUT"
              echo "cache_key=${cache_key}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unknown Blender target: ${{ matrix.target }}" >&2
              exit 1
              ;;
          esac

      - name: Restore Blender cache
        id: blender_cache
        uses: actions/cache/restore@v5
        with:
          path: .cache/blender
          key: blender-${{ steps.target.outputs.cache_key }}-${{ runner.arch }}

      - name: Install Blender
        id: install_blender
        run: mise run blender install ${{ steps.target.outputs.blender }}

      - name: Delete stale Blender cache
        # GitHub cache entries are immutable. Delete the old key when the installer
        # replaced a cached Blender patch, then save the refreshed folder below.
        if: ${{ github.event_name != 'pull_request' && steps.blender_cache.outputs.cache-hit == 'true' && steps.install_blender.outputs.cache_updated == 'true' }}
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          BLENDER_CACHE_KEY: blender-${{ steps.target.outputs.cache_key }}-${{ runner.arch }}
        run: gh cache delete "$BLENDER_CACHE_KEY" || true

      - name: Save Blender cache
        # Pull requests cannot reliably update shared caches, so refresh only on trusted events.
        if: ${{ github.event_name != 'pull_request' && (steps.blender_cache.outputs.cache-hit != 'true' || steps.install_blender.outputs.cache_updated == 'true') }}
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: .cache/blender
          key: blender-${{ steps.target.outputs.cache_key }}-${{ runner.arch }}

      - name: Print Blender version
        run: mise run blender run -- --version

      - name: Run headless Blender checks
        run: mise run blender run -- --background --factory-startup --python-exit-code 1 --python checks/source_addon.py

  live-clipboard-targets:
    name: Plan live clipboard targets
    if: inputs.scope == 'all' || inputs.scope == 'clipboard'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Choose live clipboard targets
        id: matrix
        shell: python
        run: |
          import json
          import os
          import sys

          profile = "${{ inputs.profile }}"
          sessions = [
              ("Linux X11 clipboard", "ubuntu-24.04", "linux-x11", "linux"),
              ("Linux Wayland clipboard", "ubuntu-24.04", "linux-wayland", "linux"),
          ]

          if profile == "fast":
              targets = [("Linux X11 clipboard", "ubuntu-24.04", "linux-x11", "linux", "5.1")]
          elif profile == "full":
              targets = []
              for session in sessions:
                  blenders = ("4.2", "4.5", "5.1")
                  if session[2] == "linux-wayland":
                      # Blender 4.5 exits in hosted headless Sway during image
                      # paste before Pasty can write a result. Keep 4.5 covered
                      # by X11 live checks and headless Wayland-free checks.
                      blenders = ("4.2", "5.1")
                  targets.extend((*session, blender) for blender in blenders)
          else:
              print(f"Unknown profile: {profile}", file=sys.stderr)
              raise SystemExit(1)

          target_filter = "${{ inputs.clipboard_target }}".strip().lower()
          if target_filter:
              targets = [
                  target
                  for target in targets
                  if target_filter in f"{target[0]}, Blender {target[4]}".lower()
              ]
              if not targets:
                  print(f"No live clipboard target matched: {target_filter}", file=sys.stderr)
                  raise SystemExit(1)

          matrix = {
              "include": [
                  {
                      "label": f"{label}, Blender {blender}",
                      "runner": runner,
                      "session": session,
                      "blender": blender,
                      "cache_key": f"{cache_prefix}-blender-{blender}",
                  }
                  for label, runner, session, cache_prefix, blender in targets
              ]
          }

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"matrix={json.dumps(matrix, separators=(',', ':'))}\n")

  live-clipboard:
    name: ${{ matrix.label }}
    needs: [source-addon, live-clipboard-targets]
    if: inputs.scope == 'all' || inputs.scope == 'clipboard'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.live-clipboard-targets.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref }}
          persist-credentials: false

      - name: Restore mise tool cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.local/share/mise
            ~/AppData/Local/mise
          key: mise-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.mise/mise.lock') }}
          restore-keys: mise-${{ runner.os }}-${{ runner.arch }}-

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: Restore Blender cache
        id: blender_cache
        uses: actions/cache/restore@v5
        with:
          path: .cache/blender
          key: blender-${{ matrix.cache_key }}-${{ runner.arch }}

      - name: Install Blender
        id: install_blender
        run: mise run blender install ${{ matrix.blender }}

      - name: Delete stale Blender cache
        if: ${{ github.event_name != 'pull_request' && steps.blender_cache.outputs.cache-hit == 'true' && steps.install_blender.outputs.cache_updated == 'true' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          BLENDER_CACHE_KEY: blender-${{ matrix.cache_key }}-${{ runner.arch }}
        run: gh cache delete "$BLENDER_CACHE_KEY" || true

      - name: Save Blender cache
        if: ${{ github.event_name != 'pull_request' && (steps.blender_cache.outputs.cache-hit != 'true' || steps.install_blender.outputs.cache_updated == 'true') }}
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: .cache/blender
          key: blender-${{ matrix.cache_key }}-${{ runner.arch }}

      - name: Install Linux X11 clipboard tools
        if: matrix.session == 'linux-x11'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb xauth xclip libegl1

      - name: Install Linux Wayland clipboard tools
        if: matrix.session == 'linux-wayland'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dbus-x11 \
            kmod \
            libdecor-0-0 \
            libegl-mesa0 \
            libegl1 \
            libgl1-mesa-dri \
            libgles2 \
            libwayland-egl1 \
            mesa-utils \
            mesa-utils-extra \
            sway \
            wl-clipboard \
            wtype \
            ydotool \
            ydotoold

      - name: Run Linux X11 clipboard check
        if: matrix.session == 'linux-x11'
        shell: bash
        run: |
          export DISPLAY=:99
          Xvfb "$DISPLAY" -screen 0 1280x1024x24 -nolisten tcp > "$RUNNER_TEMP/xvfb.log" 2>&1 &
          xvfb_pid="$!"
          trap 'kill "$xvfb_pid" 2>/dev/null || true' EXIT
          for _ in {1..30}; do
            if [ -S /tmp/.X11-unix/X99 ]; then
              break
            fi
            sleep 0.2
          done
          timeout 25m mise run test clipboard all

      - name: Run Linux Wayland clipboard check
        if: matrix.session == 'linux-wayland'
        shell: bash
        run: |
          export XDG_RUNTIME_DIR="$RUNNER_TEMP/wayland-runtime"
          mkdir -p "$XDG_RUNTIME_DIR"
          chmod 700 "$XDG_RUNTIME_DIR"
          export WAYLAND_DISPLAY=wayland-1
          export WLR_BACKENDS=headless,libinput
          export WLR_LIBINPUT_NO_DEVICES=1
          export WLR_RENDERER=pixman
          export LIBSEAT_BACKEND=noop
          export XDG_CURRENT_DESKTOP=sway
          export LIBGL_ALWAYS_SOFTWARE=1
          export GALLIUM_DRIVER=llvmpipe
          export MESA_LOADER_DRIVER_OVERRIDE=llvmpipe
          export __EGL_VENDOR_LIBRARY_FILENAMES=/usr/share/glvnd/egl_vendor.d/50_mesa.json
          cat > "$RUNNER_TEMP/sway.config" <<'EOF'
          xwayland disable
          output HEADLESS-1 resolution 1280x1024 position 0,0
          seat seat0 xcursor_theme Adwaita 24
          default_border none
          EOF
          sway_pid=""
          ydotoold_pid=""
          dump_logs_and_stop() {
            status="$?"
            if [ "$status" -ne 0 ]; then
              for log in "$RUNNER_TEMP/sway.log" "$RUNNER_TEMP/ydotoold.log" "$RUNNER_TEMP/eglinfo.log"; do
                if [ -f "$log" ]; then
                  echo "::group::$(basename "$log")"
                  cat "$log"
                  echo "::endgroup::"
                fi
              done
            fi
            if [ -n "$ydotoold_pid" ]; then
              sudo kill "$ydotoold_pid" 2>/dev/null || true
            fi
            if [ -n "$sway_pid" ]; then
              kill "$sway_pid" 2>/dev/null || true
            fi
          }
          trap dump_logs_and_stop EXIT
          sudo modprobe uinput || true
          if [ -e /dev/uinput ]; then
            sudo chmod 666 /dev/uinput
            export YDOTOOL_SOCKET=/tmp/.ydotool_socket
            sudo rm -f "$YDOTOOL_SOCKET"
            sudo sh -c 'exec ydotoold > "$1" 2>&1' sh "$RUNNER_TEMP/ydotoold.log" &
            ydotoold_pid="$!"
            for _ in {1..30}; do
              if [ -S "$YDOTOOL_SOCKET" ]; then
                sudo chmod 666 "$YDOTOOL_SOCKET"
                sudo chmod -R a+rw /dev/input /dev/uinput 2>/dev/null || true
                break
              fi
              sleep 0.2
            done
          else
            echo "/dev/uinput is not available; continuing with Wayland virtual-keyboard input only."
          fi
          sway -c "$RUNNER_TEMP/sway.config" -d > "$RUNNER_TEMP/sway.log" 2>&1 &
          sway_pid="$!"
          for _ in {1..30}; do
            if [ -S "$XDG_RUNTIME_DIR/$WAYLAND_DISPLAY" ]; then
              break
            fi
            sleep 1
          done
          if [ ! -S "$XDG_RUNTIME_DIR/$WAYLAND_DISPLAY" ]; then
            cat "$RUNNER_TEMP/sway.log"
            exit 1
          fi
          swaysock=""
          for _ in {1..30}; do
            swaysock="$(find "$XDG_RUNTIME_DIR" -maxdepth 1 -type s -name 'sway-ipc*.sock' -print -quit || true)"
            if [ -n "$swaysock" ]; then
              break
            fi
            sleep 0.2
          done
          if [ -n "$swaysock" ]; then
            export SWAYSOCK="$swaysock"
            swaymsg -t get_outputs || true
            swaymsg -t get_seats || true
          else
            echo "Sway IPC socket is not available; continuing with the Wayland clipboard check."
          fi
          printf 'pasty-wayland-check' | wl-copy --type text/plain
          test "$(wl-paste --no-newline --type text/plain)" = 'pasty-wayland-check'
          eglinfo --wayland > "$RUNNER_TEMP/eglinfo.log" 2>&1 || true
          mise run test clipboard all

  installed-addon:
    name: Installed add-on
    needs: [source-addon, headless-blender, live-clipboard]
    if: ${{ inputs.scope == 'all' && !cancelled() && !failure() && (needs.live-clipboard.result == 'success' || needs.live-clipboard.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref }}
          persist-credentials: false

      - name: Restore mise tool cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.local/share/mise
            ~/AppData/Local/mise
          key: mise-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.mise/mise.lock') }}
          restore-keys: mise-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: Install dependencies
        run: mise run deps

      - name: Restore Blender cache
        uses: actions/cache/restore@v5
        with:
          path: .cache/blender
          key: blender-linux-blender-5.1-${{ runner.arch }}

      - name: Install Blender
        run: mise run blender install 5.1

      - name: Build and check installed add-on
        run: mise run test package

      - name: Create SHA256 checksum
        if: inputs.create_checksum
        shell: bash
        run: shasum -a 256 dist/pasty-*.zip > dist/SHA256SUMS

      - name: Upload package artifact
        if: ${{ !inputs.create_checksum }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}
          path: dist/pasty-*.zip
          if-no-files-found: error

      - name: Upload package artifact
        if: inputs.create_checksum
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}
          path: |
            dist/pasty-*.zip
            dist/SHA256SUMS
          if-no-files-found: error

      - name: Minimize uv cache
        run: mise exec -- uv cache prune --ci
