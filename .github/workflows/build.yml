name: Build Blender add-on

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build add-on
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: 0.8.x

      - name: Install dependencies
        run: uv sync --locked --only-group build --compile-bytecode

      - name: Build add-on
        run: ./script/extension build

      - name: Upload add-on
        uses: actions/upload-artifact@v4
        with:
          name: pasty
          path: pasty-*.zip
