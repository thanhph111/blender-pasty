name: Blender

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 5 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BLENDER_USER_CONFIG: ${{ github.workspace }}/.cache/blender-user/config
  BLENDER_USER_EXTENSIONS: ${{ github.workspace }}/.cache/blender-user/extensions
  BLENDER_USER_SCRIPTS: ${{ github.workspace }}/.cache/blender-user/scripts

jobs:
  headless:
    name: Headless / ${{ matrix.os }} / Blender ${{ matrix.blender }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            blender: 4.2.21
          - os: ubuntu-24.04
            blender: 4.5.10
          - os: ubuntu-24.04
            blender: 5.1.2
          - os: windows-2025
            blender: 4.2.21
          - os: windows-2025
            blender: 4.5.10
          - os: windows-2025
            blender: 5.1.2
          - os: macos-15
            blender: 4.2.21
          - os: macos-15
            blender: 4.5.10
          - os: macos-15
            blender: 5.1.2
          - os: macos-15-intel
            blender: 4.2.21
          - os: macos-15-intel
            blender: 4.5.10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Restore Blender cache
        uses: actions/cache@v5
        with:
          path: .cache/blender
          key: blender-${{ runner.os }}-${{ runner.arch }}-${{ matrix.blender }}

      - name: Install Blender
        run: python tests/ci/install_blender.py ${{ matrix.blender }}

      - name: Print Blender version
        run: python tests/ci/run_blender.py --version

      - name: Run headless smoke test
        run: python tests/ci/run_blender.py --background --factory-startup --python-exit-code 1 --python tests/smoke_extension.py

  gui-clipboard:
    name: GUI Clipboard / ${{ matrix.os }} / Blender ${{ matrix.blender }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            blender: 4.2.21
          - os: ubuntu-24.04
            blender: 4.5.10
          - os: ubuntu-24.04
            blender: 5.1.2
          - os: windows-2025
            blender: 4.2.21
          - os: windows-2025
            blender: 4.5.10
          - os: windows-2025
            blender: 5.1.2
          - os: macos-15
            blender: 4.2.21
          - os: macos-15
            blender: 4.5.10
          - os: macos-15
            blender: 5.1.2
          - os: macos-15-intel
            blender: 4.2.21
          - os: macos-15-intel
            blender: 4.5.10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Restore Blender cache
        uses: actions/cache@v5
        with:
          path: .cache/blender
          key: blender-${{ runner.os }}-${{ runner.arch }}-${{ matrix.blender }}

      - name: Install Blender
        run: python tests/ci/install_blender.py ${{ matrix.blender }}

      - name: Install Linux GUI tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            dbus-x11 \
            libdbus-1-3 \
            libdecor-0-0 \
            libegl1 \
            libgl1 \
            libice6 \
            libsm6 \
            libwayland-client0 \
            libwayland-cursor0 \
            libx11-6 \
            libxcb1 \
            libxcursor1 \
            libxfixes3 \
            libxi6 \
            libxinerama1 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libxrandr2 \
            libxrender1 \
            libxxf86vm1 \
            weston \
            wl-clipboard

      - name: Start Linux Wayland display
        if: runner.os == 'Linux'
        run: |
          export XDG_RUNTIME_DIR="${RUNNER_TEMP}/xdg-runtime"
          mkdir -p "${XDG_RUNTIME_DIR}"
          chmod 700 "${XDG_RUNTIME_DIR}"
          weston --backend=headless-backend.so --socket=pasty-ci --idle-time=0 > "${RUNNER_TEMP}/weston.log" 2>&1 &
          echo "$!" > "${RUNNER_TEMP}/weston.pid"
          sleep 2
          echo "XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}" >> "${GITHUB_ENV}"
          echo "WAYLAND_DISPLAY=pasty-ci" >> "${GITHUB_ENV}"
          echo "GHOST_BACKEND=wayland" >> "${GITHUB_ENV}"

      - name: Put image on clipboard
        run: python tests/ci/put_clipboard_image.py

      - name: Run GUI clipboard test
        run: python tests/ci/run_blender.py --factory-startup --python-exit-code 1 --python tests/gui_clipboard.py

      - name: Upload Weston log
        if: failure() && runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: weston-${{ matrix.blender }}
          path: ${{ runner.temp }}/weston.log
          if-no-files-found: ignore
