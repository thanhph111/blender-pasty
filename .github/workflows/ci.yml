name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 5 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BLENDER_USER_CONFIG: ${{ github.workspace }}/.cache/blender-user/config
  BLENDER_USER_EXTENSIONS: ${{ github.workspace }}/.cache/blender-user/extensions
  BLENDER_USER_SCRIPTS: ${{ github.workspace }}/.cache/blender-user/scripts
  DPRINT_CACHE_DIR: ${{ github.workspace }}/.cache/dprint
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}
  UV_CACHE_DIR: ${{ github.workspace }}/.cache/uv

jobs:
  commit-messages:
    name: Validate commit messages
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate conventional commits
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          status=0
          while IFS= read -r msg; do
            if ! .mise/tasks/check-commit-message <(printf '%s\n' "$msg"); then
              status=1
            fi
          done < <(gh pr view "$PR_NUMBER" --json commits --jq '.commits[].messageHeadline')
          exit "$status"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Restore mise tool cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/mise
          key: mise-${{ runner.os }}-${{ hashFiles('.mise/mise.lock') }}
          restore-keys: mise-${{ runner.os }}-

      - name: Restore prek cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/prek
          key: prek-${{ runner.os }}-${{ hashFiles('prek.toml') }}
          restore-keys: |
            prek-${{ runner.os }}-

      - name: Restore dprint cache
        uses: actions/cache@v5
        with:
          path: ${{ env.DPRINT_CACHE_DIR }}
          key: dprint-${{ runner.os }}-${{ hashFiles('dprint.jsonc') }}
          restore-keys: |
            dprint-${{ runner.os }}-

      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: Install dependencies
        run: mise run deps

      - name: Run lint checks
        run: mise run lint

  test:
    name: Test
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Restore mise tool cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/mise
          key: mise-${{ runner.os }}-${{ hashFiles('.mise/mise.lock') }}
          restore-keys: mise-${{ runner.os }}-

      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: Install dependencies
        run: mise run deps

      - name: Run tests
        run: mise run test

  blender:
    name: Blender / ${{ matrix.os }} / ${{ matrix.blender }}
    needs: [test]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            blender: '4.2'
          - os: ubuntu-24.04
            blender: '4.5'
          - os: ubuntu-24.04
            blender: '5.1'
          - os: windows-2025
            blender: '4.2'
          - os: windows-2025
            blender: '4.5'
          - os: windows-2025
            blender: '5.1'
          - os: macos-15
            blender: '4.2'
          - os: macos-15
            blender: '4.5'
          - os: macos-15
            blender: '5.1'
          - os: macos-15-intel
            blender: '4.2'
          - os: macos-15-intel
            blender: '4.5'
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Restore mise tool cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/mise
          key: mise-${{ runner.os }}-${{ hashFiles('.mise/mise.lock') }}
          restore-keys: mise-${{ runner.os }}-

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: Restore Blender cache
        id: blender_cache
        uses: actions/cache/restore@v5
        with:
          path: .cache/blender
          key: blender-${{ runner.os }}-${{ runner.arch }}-${{ matrix.blender }}

      - name: Install Blender
        id: install_blender
        run: mise run blender-install ${{ matrix.blender }}

      - name: Delete stale Blender cache
        if: ${{ github.event_name != 'pull_request' && steps.blender_cache.outputs.cache-hit == 'true' && steps.install_blender.outputs.cache_updated == 'true' }}
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          BLENDER_CACHE_KEY: blender-${{ runner.os }}-${{ runner.arch }}-${{ matrix.blender }}
        run: gh cache delete "$BLENDER_CACHE_KEY" || true

      - name: Save Blender cache
        if: ${{ github.event_name != 'pull_request' && (steps.blender_cache.outputs.cache-hit != 'true' || steps.install_blender.outputs.cache_updated == 'true') }}
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: .cache/blender
          key: blender-${{ runner.os }}-${{ runner.arch }}-${{ matrix.blender }}

      - name: Print Blender version
        run: mise run blender-run -- --version

      - name: Run headless smoke test
        run: mise run blender-run -- --background --factory-startup --python-exit-code 1 --python tests/smoke_extension.py

  build:
    name: Build
    needs: [test, blender]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Restore mise tool cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/mise
          key: mise-${{ runner.os }}-${{ hashFiles('.mise/mise.lock') }}
          restore-keys: mise-${{ runner.os }}-

      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: Install dependencies
        run: mise run deps

      - name: Build add-on
        run: mise run build

      - name: Upload add-on
        uses: actions/upload-artifact@v7
        with:
          name: pasty
          path: dist/pasty-*.zip
          if-no-files-found: error
