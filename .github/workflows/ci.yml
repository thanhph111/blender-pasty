name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DPRINT_CACHE_DIR: ${{ github.workspace }}/.cache/dprint
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}
  UV_CACHE_DIR: ${{ github.workspace }}/.cache/uv

jobs:
  commit-messages:
    name: Validate commit messages
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate conventional commits
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          status=0
          while IFS= read -r msg; do
            if ! .mise/tasks/check-commit-message <(printf '%s\n' "$msg"); then
              status=1
            fi
          done < <(gh pr view "$PR_NUMBER" --json commits --jq '.commits[].messageHeadline')
          exit "$status"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Restore mise tool cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/mise
          key: mise-${{ runner.os }}-${{ hashFiles('.mise/mise.lock') }}
          restore-keys: mise-${{ runner.os }}-

      - name: Restore prek cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/prek
          key: prek-${{ runner.os }}-${{ hashFiles('prek.toml') }}
          restore-keys: |
            prek-${{ runner.os }}-

      - name: Restore dprint cache
        uses: actions/cache@v5
        with:
          path: ${{ env.DPRINT_CACHE_DIR }}
          key: dprint-${{ runner.os }}-${{ hashFiles('dprint.jsonc') }}
          restore-keys: |
            dprint-${{ runner.os }}-

      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: Install dependencies
        run: mise run deps

      - name: Run lint checks
        run: mise run lint

  test:
    name: Test
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Restore mise tool cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/mise
          key: mise-${{ runner.os }}-${{ hashFiles('.mise/mise.lock') }}
          restore-keys: mise-${{ runner.os }}-

      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: Install dependencies
        run: mise run deps

      - name: Run tests
        run: mise run test

  build:
    name: Build
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Restore mise tool cache
        uses: actions/cache@v5
        with:
          path: ~/.local/share/mise
          key: mise-${{ runner.os }}-${{ hashFiles('.mise/mise.lock') }}
          restore-keys: mise-${{ runner.os }}-

      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: Install dependencies
        run: mise run deps

      - name: Build add-on
        run: mise run build

      - name: Upload add-on
        uses: actions/upload-artifact@v7
        with:
          name: pasty
          path: dist/pasty-*.zip
          if-no-files-found: error
